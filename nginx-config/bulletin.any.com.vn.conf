server {
    listen 80;
    server_name bulletin.any.com.vn;

    root /var/www/bulletin.any.com.vn;
    index index.html index.htm index.php;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
    }
}